<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Northstar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="loading-screen" aria-hidden="true">
      <div class="loader"></div>
    </div>

    <header class="site-header">
      <nav class="navbar container">
        <a href="index.html" class="brand">
          <span class="brand-mark">N</span>
          <span>Northstar</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html" class="active">Products</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
          <a href="cart.html" class="cart-link">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-count">0</span>
          </a>
          <button class="theme-toggle" aria-label="Toggle theme">
            <i class="fa-solid fa-moon"></i>
          </button>
        </div>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <p class="eyebrow">Discover the collection</p>
          <h1>Premium essentials for every room and routine.</h1>
        </div>
      </section>

      <section class="container section" data-reveal>
        <div class="shop-toolbar">
          <input id="searchInput" type="search" placeholder="Search products" />
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
          <select id="sortSelect">
            <option value="featured">Featured</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
        <div id="productGrid" class="product-grid"></div>
        <div class="pagination" id="pagination"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <a href="index.html" class="brand footer-brand">
            <span class="brand-mark">N</span>
            <span>Northstar</span>
          </a>
          <p>Curated essentials for a modern, elevated life.</p>
        </div>
        <div>
          <h3>Quick Links</h3>
          <ul>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </div>
        <div>
          <h3>Follow Us</h3>
          <div class="social-links">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
          </div>
        </div>
      </div>
    </footer>

    <button class="back-to-top" aria-label="Back to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
  </body>
</html>
